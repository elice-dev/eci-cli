image: docker.io/elice/python:3.11

stages:
  - check
  - build
  - deploy


variables:
  UV_CACHE_DIR: .uv-cache
  XDG_CACHE_HOME: "$CI_PROJECT_DIR/.cache"

cache:
    key:
      files:
        - pyproject.toml
        - uv.lock
    paths:
      - $UV_CACHE_DIR


.prepare-uv-linux: &prepare-uv-linux
  - python -m pip install uv
  - uv venv
  - uv sync --locked --no-install-project
  - uv cache prune --ci


# === check: lint + tests (every commit) ===

check-job:
  stage: check
  before_script:
    - *prepare-uv-linux
  script:
    - uv run make check


test-unit-job:
  stage: check
  before_script:
    - *prepare-uv-linux
  script:
    - uv run pytest --cov=app --cov-report=term --cov-report=xml tests/
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 days


# === build: per-OS Nuitka binary (tag only) ===
# Requires GitLab Runners registered with these tags:
#   - default Docker runner       → build-linux-job
#   - tags: [macos]               → build-macos-job
#   - tags: [windows]             → build-windows-job

build-linux-job:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc patchelf
    - *prepare-uv-linux
  script:
    - uv run make build-binary
    - mv dist/eci dist/eci-linux-x86_64-${CI_COMMIT_TAG}
  artifacts:
    paths:
      - dist/eci-linux-x86_64-*
    expire_in: 7 days


build-macos-job:
  stage: build
  tags: [macos]
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - python3 -m pip install --user uv
    - export PATH="$HOME/.local/bin:$PATH"
    - uv venv
    - uv sync --locked --no-install-project
  script:
    - uv run make build-binary
    - mv dist/eci dist/eci-darwin-${CI_COMMIT_TAG}
  artifacts:
    paths:
      - dist/eci-darwin-*
    expire_in: 7 days


build-windows-job:
  stage: build
  tags: [windows]
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - python -m pip install uv
    - uv venv
    - uv sync --locked --no-install-project
  script:
    # Windows runner uses PowerShell; call nuitka directly (no `make` available).
    - uv run python -m nuitka --onefile --output-filename=eci.exe --output-dir=dist --include-package=app --assume-yes-for-downloads --remove-output --no-progressbar --mingw64 entry.py
    - Move-Item dist\eci.exe "dist\eci-windows-x86_64-${env:CI_COMMIT_TAG}.exe"
  artifacts:
    paths:
      - dist/eci-windows-*
    expire_in: 7 days


# === deploy: upload + release (tag only) ===

deploy-upload-job:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build-linux-job
      artifacts: true
    - job: build-macos-job
      artifacts: true
    - job: build-windows-job
      artifacts: true
  cache: {}
  script:
    - |
      LINUX="eci-linux-x86_64-${CI_COMMIT_TAG}"
      MAC="eci-darwin-${CI_COMMIT_TAG}"
      WIN="eci-windows-x86_64-${CI_COMMIT_TAG}.exe"
      BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}"

      for NAME in "${LINUX}" "${MAC}" "${WIN}"; do
        curl --fail-with-body \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "dist/${NAME}" \
          "${BASE}/${NAME}"
      done


deploy-release-job:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build-linux-job
      artifacts: true
    - job: build-macos-job
      artifacts: true
    - job: build-windows-job
      artifacts: true
    - job: deploy-upload-job
  cache: {}
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script:
    - apk add --no-cache gettext
  script:
    - |
      export LINUX="eci-linux-x86_64-${CI_COMMIT_TAG}"
      export MAC="eci-darwin-${CI_COMMIT_TAG}"
      export WIN="eci-windows-x86_64-${CI_COMMIT_TAG}.exe"
      export BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}"

      export LINUX_SHA=$(sha256sum "dist/${LINUX}" | awk '{print $1}')
      export MAC_SHA=$(sha256sum "dist/${MAC}" | awk '{print $1}')
      export WIN_SHA=$(sha256sum "dist/${WIN}" | awk '{print $1}')

      cat > RELEASE_NOTES.md <<'EOF'
      Automatic release for ${CI_COMMIT_TAG}

      Pick the binary for your OS, make executable, place on PATH.

      ```
      # Linux (x86_64)
      curl -L -o eci ${BASE}/${LINUX} && chmod +x eci

      # macOS
      curl -L -o eci ${BASE}/${MAC} && chmod +x eci

      # Windows (x86_64)
      Invoke-WebRequest -Uri ${BASE}/${WIN} -OutFile eci.exe
      ```

      **Checksums (SHA256)**
      - `${LINUX}`: `${LINUX_SHA}`
      - `${MAC}`: `${MAC_SHA}`
      - `${WIN}`: `${WIN_SHA}`
      EOF

      envsubst < RELEASE_NOTES.md > RELEASE_NOTES.rendered.md

      release-cli create \
        --name "Release ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "$(cat RELEASE_NOTES.rendered.md)" \
        --assets-link "{\"name\":\"${LINUX}\",\"url\":\"${BASE}/${LINUX}\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"${MAC}\",\"url\":\"${BASE}/${MAC}\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"${WIN}\",\"url\":\"${BASE}/${WIN}\",\"link_type\":\"package\"}"
