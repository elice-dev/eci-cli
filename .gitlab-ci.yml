image: docker.io/elice/python:3.11

stages:
  - build
  - test
  - deploy


variables:
  UV_CACHE_DIR: .uv-cache
  XDG_CACHE_HOME: "$CI_PROJECT_DIR/.cache"

cache:
    key:
      files:
        - pyproject.toml
        - uv.lock
    paths:
      - $UV_CACHE_DIR

.prepare-uv-template: &prepare-uv
  - python -m pip install uv
  - uv venv
  - uv sync --locked --no-install-project
  - uv cache prune --ci


build-job:
  stage: build
  before_script:
    - *prepare-uv
  script:
    - uv run make check
    - uv run make build
  artifacts:
    paths:
      - dist/
    expire_in: 1 days


test-unit-job:
  stage: test
  before_script:
    - *prepare-uv
  script:
    - uv run pytest --cov=app --cov-report=term --cov-report=xml tests/
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 days


deploy-pre-release-upload-job:
  stage: deploy
  needs:
    - job: build-job
      artifacts: true
  cache: {}
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      WHEEL_FILE=$(find dist/ -type f -name "*.whl" | head -n1)
      SDIST_FILE=$(find dist/ -type f -name "*.tar.gz" | head -n1)
      WHEEL_NAME=$(basename "${WHEEL_FILE}")
      SDIST_NAME=$(basename "${SDIST_FILE}")

      curl --fail-with-body \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file "${WHEEL_FILE}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}/${WHEEL_NAME}"

      curl --fail-with-body \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file "${SDIST_FILE}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}/${SDIST_NAME}"


deploy-release-job:
  stage: deploy
  needs:
    - job: build-job
      artifacts: true
    - job: deploy-pre-release-upload-job
  cache: {}
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache gettext
  script:
    - |
      WHEEL_FILE=$(find dist/ -type f -name "*.whl" | head -n1)
      SDIST_FILE=$(find dist/ -type f -name "*.tar.gz" | head -n1)
      WHEEL_NAME=$(basename "${WHEEL_FILE}")
      SDIST_NAME=$(basename "${SDIST_FILE}")
      WHEEL_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}/${WHEEL_NAME}"
      SDIST_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}/${SDIST_NAME}"

      export WHEEL_SHA256=$(sha256sum "${WHEEL_FILE}" | awk '{print $1}')
      export SDIST_SHA256=$(sha256sum "${SDIST_FILE}" | awk '{print $1}')

      cat > RELEASE_NOTES.md <<'EOF'
      Automatic release description for ${CI_COMMIT_TAG}

      **Checksums (SHA256)**
      - ${WHEEL_NAME}: `${WHEEL_SHA256}`
      - ${SDIST_NAME}: `${SDIST_SHA256}`
      EOF

      envsubst < RELEASE_NOTES.md > RELEASE_NOTES.rendered.md

      release-cli create \
        --name "Release ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "$(cat RELEASE_NOTES.rendered.md)" \
        --assets-link "{\"name\":\"${WHEEL_NAME}\",\"url\":\"${WHEEL_URL}\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"${SDIST_NAME}\",\"url\":\"${SDIST_URL}\",\"link_type\":\"package\"}"
