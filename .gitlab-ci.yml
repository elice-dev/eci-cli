image: docker.io/elice/python:3.11

stages:
  - build
  - test
  - deploy


variables:
  UV_CACHE_DIR: .uv-cache
  XDG_CACHE_HOME: "$CI_PROJECT_DIR/.cache"


cache:
    key:
      files:
        - pyproject.toml
        - uv.lock
    paths:
      - $UV_CACHE_DIR


.prepare-uv-template: &prepare-uv
  - python -m pip install uv
  - uv venv
  - uv sync --locked --no-install-project
  - uv cache prune --ci


build-job:
  stage: build
  before_script:
    - *prepare-uv
  script:
    - uv run make check
    - rm -rf dist
    - apt-get update
    - apt-get install -y --no-install-recommends gcc libc6-dev patchelf
    - uv run make build-standalone
    - mv dist/entry.dist "dist/eci-linux-x86_64-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - tar czf "dist/eci-linux-x86_64-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}.tar.gz" -C dist "eci-linux-x86_64-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - (cd dist && sha256sum "eci-linux-x86_64-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}.tar.gz" > checksums.txt)
  artifacts:
    paths:
      - dist/
    expire_in: 1 days


test-unit-job:
  stage: test
  before_script:
    - *prepare-uv
  script:
    - uv run pytest --cov=app --cov-report term --cov-report html
    - uv run coverage xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 days


deploy-pre-release-upload-job:
  stage: deploy
  needs: ["build-job"]
  cache: {}
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - 'curl
      --fail-with-body
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "dist/eci-linux-x86_64-${CI_COMMIT_TAG}.tar.gz"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}/eci-linux-x86_64-${CI_COMMIT_TAG}.tar.gz"'
    - 'curl
      --fail-with-body
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "dist/checksums.txt"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}/checksums.txt"'


deploy-release-job:
  stage: deploy
  needs:
    - job: build-job
      artifacts: true
    - job: deploy-pre-release-upload-job
  cache: {}
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache gettext
  script:
    - |
      ASSET_NAME="eci-linux-x86_64-${CI_COMMIT_TAG}.tar.gz"
      ASSET_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release/${CI_COMMIT_TAG}/${ASSET_NAME}"

      export BIN_MD5=$(md5sum "dist/${ASSET_NAME}" | awk '{print $1}')
      export BIN_SHA1=$(sha1sum "dist/${ASSET_NAME}" | awk '{print $1}')
      export BIN_SHA256=$(sha256sum "dist/${ASSET_NAME}" | awk '{print $1}')

      cat > RELEASE_NOTES.md <<'EOF'
      Automatic release description for ${CI_COMMIT_TAG}

      **Checksums**
      - MD5: `${BIN_MD5}`
      - SHA1: `${BIN_SHA1}`
      - SHA256: `${BIN_SHA256}`
      EOF

      envsubst < RELEASE_NOTES.md > RELEASE_NOTES.rendered.md

      release-cli create \
        --name "Release ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "$(cat RELEASE_NOTES.rendered.md)" \
        --assets-link "{\"name\":\"${ASSET_NAME}\",\"url\":\"${ASSET_URL}\",\"link_type\":\"other\"}"
