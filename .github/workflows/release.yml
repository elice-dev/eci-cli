name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: ubuntu-24.04
            target: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python toolchain
        run: uv python install 3.11

      - name: Build standalone bundle
        run: make build-standalone

      - name: Package tarball
        id: package
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          asset="eci-${{ matrix.target }}-${version}.tar.gz"
          (cd dist && tar czf "${asset}" entry.dist)
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${asset}" > "checksums-${{ matrix.target }}.txt")
          else
            (cd dist && shasum -a 256 "${asset}" > "checksums-${{ matrix.target }}.txt")
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/eci-${{ matrix.target }}-*.tar.gz
            dist/checksums-${{ matrix.target }}.txt
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Combine checksums
        run: |
          set -eu
          cat artifacts/checksums-*.txt > artifacts/checksums.txt
          rm -f artifacts/checksums-*.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/eci-*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
